<!DOCTYPE html>
<html>
<head>
    <title>Your Wedding Card</title>
    <link rel="stylesheet" href="/static/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display&family=Poppins&display=swap" rel="stylesheet">
</head>

<body>

<div class="card">

    <h1>{{ guest.name }}</h1>
    <div class="table">{{ guest.table }}</div>

    <img src="data:image/png;base64,{{ qr }}">

    <div class="note">
        Save this card or take a screenshot. It works offline.
    </div>

    <div class="actions">
        <a class="btn" href="javascript:window.print()">Print / Save PDF</a>
        <a class="btn secondary" href="/cards">All Cards</a>
    </div>

</div>

</body>
</html>
