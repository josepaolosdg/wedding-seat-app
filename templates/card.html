<!DOCTYPE html>
<html>
<head>
    <title>Your Wedding Card</title>

    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display&family=Poppins&display=swap" rel="stylesheet">

    <style>
        body {
            margin: 0;
            background: linear-gradient(135deg, #f4f6f2, #e8ede5);
            color: #3e433a;
            font-family: 'Poppins', sans-serif;
            display: flex;
            justify-content: center;
            padding: 20px;
        }

        .card {
            width: 100%;
            max-width: 360px;
            background: white;
            border-radius: 18px;
            padding: 24px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        h1 {
            font-family: 'Playfair Display', serif;
            font-size: 22px;
            margin-bottom: 6px;
        }

        .table {
            color: #3e433a;
            font-size: 18px;
            margin-bottom: 16px;
        }

        img {
            width: 180px;
            height: 180px;
        }

        .note {
            font-size: 12px;
            color: #777;
            margin-top: 10px;
        }

        .actions {
            margin-top: 16px;
        }

        .btn {
            display: inline-block;
            margin-top: 10px;
            padding: 10px 14px;
            border-radius: 10px;
            background: #6b7d5c;
            color: white;
            text-decoration: none;
            font-size: 14px;
        }

        .secondary {
            background: #eee;
            color: #4a3f35;
        }

        @media print {
            .actions {
                display: none;
            }
        }
    </style>
</head>

<body>

<div class="card">

    <h1>{{ guest.name }}</h1>
    <div class="table">{{ guest.table }}</div>

    <img src="data:image/png;base64,{{ qr }}">

    <div class="note">
        Save this card or take a screenshot. It works offline.
    </div>

    <div class="actions">
        <a class="btn" href="javascript:window.print()">Print / Save PDF</a>
        <a class="btn secondary" href="/cards">All Cards</a>
    </div>

</div>

</body>
</html>
