<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Wedding Cards</title>
    <link rel="stylesheet" href="/static/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Playfair+Display:wght@400;500;600&family=Poppins:wght@300;400;500&display=swap" rel="stylesheet">
</head>

<body>
    <div class="cards-container">
        <h1>Wedding Seating Cards</h1>

        <div class="cards-grid">
            {% for guest in guests %}
            <div class="card" onclick="window.open('/card/{{ guest.id }}', '_blank')">
                <div>
                    <div class="card-item-name">{{ guest.name }}</div>
                    <div class="card-item-table">{{ guest.table }}</div>
                </div>

                <a href="/card/{{ guest.id }}" target="_blank" class="card-item-link" onclick="event.stopPropagation()">
                    View Card
                </a>
            </div>
            {% endfor %}
        </div>
    </div>
</body>
</html>
