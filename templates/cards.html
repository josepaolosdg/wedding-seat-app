<!DOCTYPE html>
<html>
<head>
    <title>Wedding Cards</title>

    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display&family=Poppins&display=swap" rel="stylesheet">

    <style>
        body {
            margin: 0;
            font-family: 'Poppins', sans-serif;
            background: #fdf6f0;
            padding: 20px;
        }

        h1 {
            text-align: center;
            font-family: 'Playfair Display', serif;
            color: #4a3f35;
            margin-bottom: 20px;
        }

        .grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 16px;
            max-width: 600px;
            margin: auto;
        }

        .card {
            background: white;
            padding: 16px;
            border-radius: 14px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.08);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .name {
            font-weight: 600;
        }

        .table {
            color: #b08968;
            font-size: 14px;
        }

        a {
            text-decoration: none;
            color: white;
            background: #b08968;
            padding: 8px 12px;
            border-radius: 10px;
            font-size: 13px;
        }

        @media (min-width: 600px) {
            .grid {
                grid-template-columns: 1fr 1fr;
            }
        }
    </style>
</head>

<body>

<h1>Wedding Seating Cards</h1>

<div class="grid">
    {% for guest in guests %}
    <div class="card">
        <div>
            <div class="name">{{ guest.name }}</div>
            <div class="table">{{ guest.table }}</div>
        </div>

        <a href="/card/{{ guest.id }}" target="_blank">
            View
        </a>
    </div>
    {% endfor %}
</div>

</body>
</html>
