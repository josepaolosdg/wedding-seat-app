<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Welcome</title>
    <link rel="stylesheet" href="/static/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Playfair+Display:wght@400;500;600&family=Poppins:wght@300;400;500&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <div class="hero">
            <div class="eyebrow">Welcome</div>
            <p class="intro">to the wedding reception of</p>
            <h1>Jerald <span class="amp">&amp;</span> Krisha</h1>
            <p class="lead">Find your seating by entering your name below.</p>
        </div>

        <form method="POST" autocomplete="off">
            <input 
                type="text" 
                id="nameInput"
                name="name" 
                placeholder="Enter your name"
                required
                inputmode="text"
            >

            <div id="suggestions" class="suggestions-box"></div>

            <button type="submit">Find My Seat</button>
        </form>
    </div>

    <script>
        const input = document.getElementById("nameInput");
        const suggestionsBox = document.getElementById("suggestions");

        input.addEventListener("input", async () => {
            const query = input.value;

            if (query.length < 1) {
                suggestionsBox.innerHTML = "";
                return;
            }

            const res = await fetch(`/search?q=${query}`);
            const data = await res.json();

            suggestionsBox.innerHTML = "";

            data.results.forEach(guest => {
                const div = document.createElement("div");
                div.classList.add("suggestion-item");
                div.textContent = guest.name;

                div.onclick = () => {
                    window.location.href = `/guest/${guest.id}`;
                };

                suggestionsBox.appendChild(div);
            });
        });

        document.addEventListener("click", (e) => {
            if (!e.target.closest("form")) {
                suggestionsBox.innerHTML = "";
            }
        });
    </script>
</body>
</html>
